# ============================================================================
# Logicodex CI — single-engine (HIR) era.
#
# Guards what actually protects the code today:
#   check        — formatting + clippy + cargo check
#   test         — cargo build + full cargo test suite (includes the shipped-
#                  examples semantic-check gate) — the real drift-resistant QA
#   freestanding — x86_64 QEMU boot proof (make boot-evidence) + the one live
#                  freestanding validator
#
# NOTE: the v1.21-v1.45 sprint/pipeline validators were archived under
# scripts/validators/_archive_pre_hir/ — they structurally test a retired
# architecture and are not run here. See that folder's README.
# ============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  LLVM_SYS_150_PREFIX: /usr/lib/llvm-15
  RUSTFLAGS: "-L/usr/lib/llvm-15/lib"
  RAYLIB_NO_LINK: "1"

jobs:
  check:
    name: Check (fmt + clippy + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install LLVM 15
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libclang-15-dev libpolly-15-dev pkg-config
      - uses: dtolnay/rust-toolchain@1.75.0
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets
      - name: cargo check
        run: cargo check --all-targets

  test:
    name: Test (full suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install LLVM 15
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libclang-15-dev libpolly-15-dev pkg-config
      - uses: dtolnay/rust-toolchain@1.75.0
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build --release
      - name: Run full test suite
        run: cargo test 2>&1 | tee test-output.log
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-output-log
          path: test-output.log

  freestanding:
    name: Freestanding x86_64 QEMU boot
    runs-on: ubuntu-latest
    env:
      LLVM_SYS_150_PREFIX: /usr/lib/llvm-15
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.75.0
        with:
          targets: x86_64-unknown-none
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install LLVM 15 + QEMU + binutils
        # LLVM is needed because boot-e2e builds the compiler (cargo run) to
        # compile showcase.ldx; QEMU + binutils boot/link the kernel.
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libclang-15-dev libpolly-15-dev pkg-config qemu-system-x86 binutils
      - name: Boot evidence (multiboot -> long-mode -> serial 'Logicodex' -> clean exit 33)
        # build.sh unsets RUSTFLAGS internally so the inherited LLVM -L flag does
        # not override the freestanding target's relocation-model/linker rustflags.
        run: make boot-evidence
      - name: End-to-end .ldx -> kernel boot (#4)
        # Compiles examples/freestanding/showcase.ldx, links it into the kernel,
        # boots in QEMU, asserts the program's own output (10 20 55 17 36).
        run: make boot-e2e
      - name: Freestanding capability validator
        run: python3 scripts/validators/tier_c_stress/validate_v144_freestanding.py
