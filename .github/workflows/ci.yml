name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-L/usr/lib/llvm-15/lib"
  LLVM_SYS_150_PREFIX: /usr/lib/llvm-15

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 15
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libclang-15-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.75
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Run Tier A validators (core)
        run: cargo test --tier a

      - name: Run Tier B validators (feature)
        run: cargo test --tier b

  bench-check:
    name: Benchmark Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 15
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libclang-15-dev

      - uses: dtolnay/rust-toolchain@1.75

      - name: Build benchmarks
        run: cargo bench --no-run

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken internal links
        run: |
          # Check that SPECIFICATION.md references valid files
          grep -oP '\[.*?\]\(.*?\)' SPECIFICATION.md | grep -v 'http' | while read link; do
            file=$(echo "$link" | grep -oP '(?<=\()[^)]+')
            if [ ! -f "$file" ] && [ ! -d "$file" ]; then
              echo "BROKEN LINK: $link"
              exit 1
            fi
          done
          echo "All internal links valid"
