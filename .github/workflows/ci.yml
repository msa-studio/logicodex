name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  LLVM_SYS_150_PREFIX: /usr/lib/llvm-15
  RUSTFLAGS: "-L/usr/lib/llvm-15/lib"
  RAYLIB_NO_LINK: "1"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 15
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libclang-15-dev libpolly-15-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.75
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check build
        run: cargo check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 15
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-15-dev libclang-15-dev libpolly-15-dev pkg-config

      - uses: dtolnay/rust-toolchain@1.75

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Run unit tests
        run: cargo test

      - name: Run Tier A validators (core)
        run: |
          for v in scripts/validators/tier_a_core/*.py; do
            echo "=== $(basename "$v") ==="
            python3 "$v" || exit 1
          done

      - name: Run Tier B validators (feature)
        run: |
          for v in scripts/validators/tier_b_feature/*.py; do
            echo "=== $(basename "$v") ==="
            python3 "$v" || exit 1
          done

      - name: Check example programs compile
        run: |
          for f in examples/*.ldx; do
            if [ -f "$f" ]; then
              echo "=== Checking $f ==="
              cargo run --quiet -- check "$f" || exit 1
            fi
          done
