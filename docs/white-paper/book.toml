[book]
title = "White Paper: Compiler Philosophy and Architecture"
authors = ["Mohamad Supardi Abdul"]
description = "Logicodex compiler philosophy, architecture evolution, and design justifications"
language = "ms"
multilingual = false
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
theme = "rust"
default-theme = "rust"
preferred-dark-theme = "coal"
mathjax-support = false
copy-fonts = true
no-section-label = false

[output.html.search]
enable = true
limit-results = 20
teaser-word-count = 30

[output.html.print]
enable = true

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false

[rust]
edition = "2021"
