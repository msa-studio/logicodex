[contract]
version = 0

[module]
name = "core.assert"
layer = "core"
stage = 0
profile = "core"
pure = true
extern = false

[validation]
metadata = true
static = true
compile = true
run = true
stress = false

[limits]
compile_timeout_ms = 10000
run_timeout_ms = 2000
stdout_limit_bytes = 65536
max_cases = 50

[exports]
functions = [
  "eq_i64",
  "is_true",
]

[constraints]
allowed_imports = ["core.*"]
forbidden_imports = ["std.*", "framework.*"]
forbidden_features = ["extern", "malloc", "free", "file", "network", "syscall"]

[capabilities]
requires = []

[[cases]]
name = "eq true"
expr = "core.assert.eq_i64(5, 5)"
expect_i64 = 1

[[cases]]
name = "eq false"
expr = "core.assert.eq_i64(5, 6)"
expect_i64 = 0

[[cases]]
name = "is_true nonzero"
expr = "core.assert.is_true(9)"
expect_i64 = 1

[[cases]]
name = "is_true zero"
expr = "core.assert.is_true(0)"
expect_i64 = 0
