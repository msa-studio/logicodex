[contract]
version = 0

[module]
name = "core.result"
layer = "core"
stage = 1
profile = "core"
pure = true
extern = false

[validation]
metadata = true
static = true
compile = true
run = true
stress = false

[limits]
compile_timeout_ms = 10000
run_timeout_ms = 2000
stdout_limit_bytes = 65536
max_cases = 50

[exports]
functions = [
  "is_err_i64",
  "is_ok_i64",
  "unwrap_err_or_i64",
  "unwrap_or_i64",
]

[constraints]
allowed_imports = ["core.*"]
forbidden_imports = ["std.*", "framework.*"]
forbidden_features = ["extern", "malloc", "free", "file", "network", "syscall"]

[capabilities]
requires = []

[[cases]]
name = "unwrap ok"
expr = "core.result.unwrap_or_i64(Ok(42), 9)"
expect_i64 = 42

[[cases]]
name = "unwrap err"
expr = "core.result.unwrap_or_i64(Err(7), 9)"
expect_i64 = 9

[[cases]]
name = "unwrap err payload"
expr = "core.result.unwrap_err_or_i64(Err(7), 9)"
expect_i64 = 7

[[cases]]
name = "unwrap err fallback on ok"
expr = "core.result.unwrap_err_or_i64(Ok(42), 9)"
expect_i64 = 9

[[cases]]
name = "is ok true"
expr = "core.result.is_ok_i64(Ok(42))"
expect_i64 = 1

[[cases]]
name = "is ok false"
expr = "core.result.is_ok_i64(Err(7))"
expect_i64 = 0

[[cases]]
name = "is err true"
expr = "core.result.is_err_i64(Err(7))"
expect_i64 = 1

[[cases]]
name = "is err false"
expr = "core.result.is_err_i64(Ok(42))"
expect_i64 = 0
