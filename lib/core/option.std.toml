[contract]
version = 0

[module]
name = "core.option"
layer = "core"
stage = 1
profile = "core"
pure = true
extern = false

[validation]
metadata = true
static = true
compile = true
run = true
stress = false

[limits]
compile_timeout_ms = 10000
run_timeout_ms = 2000
stdout_limit_bytes = 65536
max_cases = 50

[exports]
functions = [
  "is_none_i64",
  "is_some_i64",
  "unwrap_or_i64",
]

[constraints]
allowed_imports = ["core.*"]
forbidden_imports = ["std.*", "framework.*"]
forbidden_features = ["extern", "malloc", "free", "file", "network", "syscall"]

[capabilities]
requires = []

[[cases]]
name = "unwrap some"
expr = "core.option.unwrap_or_i64(Some(42), 9)"
expect_i64 = 42

[[cases]]
name = "unwrap none"
expr = "core.option.unwrap_or_i64(None, 9)"
expect_i64 = 9

[[cases]]
name = "is some true"
expr = "core.option.is_some_i64(Some(42))"
expect_i64 = 1

[[cases]]
name = "is some false"
expr = "core.option.is_some_i64(None)"
expect_i64 = 0

[[cases]]
name = "is none true"
expr = "core.option.is_none_i64(None)"
expect_i64 = 1

[[cases]]
name = "is none false"
expr = "core.option.is_none_i64(Some(42))"
expect_i64 = 0
