[contract]
version = 0

[module]
name = "core.math"
layer = "core"
stage = 0
profile = "core"
pure = true
extern = false

[validation]
metadata = true
static = true
compile = true
run = true
stress = false

[limits]
compile_timeout_ms = 10000
run_timeout_ms = 2000
stdout_limit_bytes = 65536
max_cases = 50

[exports]
functions = [
  "abs_i64",
  "clamp_i64",
  "factorial_i64",
  "is_even",
  "is_odd",
  "max_i64",
  "min_i64",
  "pow_i64",
  "sign_i64",
]

[constraints]
allowed_imports = ["core.*"]
forbidden_imports = ["std.*", "framework.*"]
forbidden_features = ["extern", "malloc", "free", "file", "network", "syscall"]

[capabilities]
requires = []

[[cases]]
name = "abs negative"
expr = "core.math.abs_i64(-5)"
expect_i64 = 5

[[cases]]
name = "min chooses lower"
expr = "core.math.min_i64(3, 7)"
expect_i64 = 3

[[cases]]
name = "max chooses higher"
expr = "core.math.max_i64(3, 7)"
expect_i64 = 7

[[cases]]
name = "clamp in range"
expr = "core.math.clamp_i64(5, 0, 10)"
expect_i64 = 5

[[cases]]
name = "clamp below range"
expr = "core.math.clamp_i64(-2, 0, 10)"
expect_i64 = 0

[[cases]]
name = "clamp above range"
expr = "core.math.clamp_i64(12, 0, 10)"
expect_i64 = 10

[[cases]]
name = "sign positive"
expr = "core.math.sign_i64(9)"
expect_i64 = 1

[[cases]]
name = "sign negative"
expr = "core.math.sign_i64(-9)"
expect_i64 = -1

[[cases]]
name = "sign zero"
expr = "core.math.sign_i64(0)"
expect_i64 = 0

[[cases]]
name = "pow simple"
expr = "core.math.pow_i64(2, 5)"
expect_i64 = 32

[[cases]]
name = "is_even true"
expr = "core.math.is_even(8)"
expect_i64 = 1

[[cases]]
name = "is_odd true"
expr = "core.math.is_odd(7)"
expect_i64 = 1

[[cases]]
name = "factorial zero"
expr = "core.math.factorial_i64(0)"
expect_i64 = 1

[[cases]]
name = "factorial small"
expr = "core.math.factorial_i64(5)"
expect_i64 = 120

[[cases]]
name = "factorial negative"
expr = "core.math.factorial_i64(-3)"
expect_i64 = 0
